name: Narava Pipeline

on:
  schedule:
    # Sun/Wed/Fri 00:00 UTC = 07:00 WIB — matches PUBLISH_WEEKDAYS in agents/upload_agent.py
    - cron: "0 0 * * 0,3,5"
  workflow_dispatch: {}  # manual "Run workflow" button in the Actions tab, for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # full run is ~90min; generous headroom, well under the
                           # ~1,160 min/month estimate against the 2,000 min free tier
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube credentials
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRET_B64 }}" | base64 -d > youtube_client_secret.json
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scheduler.py
