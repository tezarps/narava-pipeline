name: Narava Pipeline

on:
  schedule:
    # Daily 00:00 UTC = 07:00 WIB, switched from Sun/Wed/Fri 2026-07-06 — pipeline
    # runs fully in the cloud now, matches PUBLISH_WEEKDAYS (every day) in
    # agents/upload_agent.py. If a topic's manual images (Google Flow) aren't in
    # Supabase Storage yet, scheduler.py pauses that topic cleanly (status
    # "awaiting_images") instead of failing — this same daily trigger just picks
    # it back up once they're ready, no separate re-trigger needed.
    - cron: "0 0 * * *"
  workflow_dispatch: {}  # manual "Run workflow" button in the Actions tab, for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # full run is ~90min; generous headroom, well under the
                           # ~1,160 min/month estimate against the 2,000 min free tier
    permissions:
      contents: write  # status_manager.py commits+pushes pipeline_status.json after
                        # every stage for the live dashboard (content-empire-hub) —
                        # the default GITHUB_TOKEN is read-only, which silently broke
                        # every push attempt until this was added (confirmed 2026-07-09:
                        # zero commits from narava-pipeline-bot existed despite the
                        # feature being live since 2026-07-08).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Kokoro TTS model files
        id: kokoro-cache
        uses: actions/cache@v4
        with:
          path: kokoro-models
          key: kokoro-models-v1.0

      - name: Download Kokoro TTS model files
        if: steps.kokoro-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p kokoro-models
          curl -L -o kokoro-models/kokoro-v1.0.onnx https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx
          curl -L -o kokoro-models/voices-v1.0.bin https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin

      - name: Restore YouTube credentials
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRET_B64 }}" | base64 -d > youtube_client_secret.json
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scheduler.py
